<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - EscolaSegura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 15px; margin-bottom: 5px; border-radius: 5px; }
        .sidebar a:hover, .sidebar a.active { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    {% if login_page %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0 mt-5">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4"><i class="bi bi-shield-lock text-primary"></i> Acesso Restrito</h4>
                        <form method="POST">
                            <input type="text" name="usuario" class="form-control mb-3" placeholder="Usuário" required>
                            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" required>
                            <button class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="d-flex">
        <div class="sidebar p-3" style="width: 250px;">
            <h4 class="mb-4 text-center">EscolaSegura</h4>
            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/denuncias"><i class="bi bi-list-task"></i> Gestão de Denúncias</a>
            <hr class="border-secondary">
            <div class="text-center mb-3">
                <img src="/qrcode" width="120" class="bg-white p-1 rounded" alt="QR Code">
                <small class="d-block mt-1 text-muted">QR Code de Acesso</small>
            </div>
            <a href="/logout" class="text-danger mt-3"><i class="bi bi-box-arrow-right"></i> Sair</a>
        </div>
        <div class="flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% endif %}
</body>
</html>
