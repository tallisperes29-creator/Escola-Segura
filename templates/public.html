<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EscolaSegura - Denúncias Anônimas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style> body { background-color: #f4f6f9; } .navbar { background-color: #0d6efd; } </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-lock-fill"></i> EscolaSegura</a>
            <a href="/login" class="btn btn-outline-light btn-sm">Área Restrita</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                {% if protocolo %}
                <div class="card shadow border-0 text-center p-5 mt-5">
                    <i class="bi bi-check-circle-fill text-success display-1"></i>
                    <h2 class="mt-3">Denúncia Recebida!</h2>
                    <p class="text-muted">Anote seu protocolo para acompanhamento:</p>
                    <h1 class="text-primary fw-bold">{{ protocolo }}</h1>
                    <a href="/" class="btn btn-primary mt-3">Nova Denúncia</a>
                </div>
                {% else %}
                <div class="card shadow border-0">
                    <div class="card-header bg-white p-4 border-0 text-center">
                        <h4>Fazer Denúncia Anônima</h4>
                        <p class="text-muted small">Sua identidade está protegida. Nenhuma informação pessoal será rastreada.</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" enctype="multipart/form-data">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nome da Escola *</label>
                                    <input type="text" name="escola" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Série/Turma</label>
                                    <input type="text" name="turma" class="form-control" placeholder="Opcional">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Local do Ocorrido *</label>
                                    <select name="local" class="form-select" required>
                                        <option value="">Selecione...</option>
                                        <option>Sala de Aula</option><option>Pátio</option><option>Banheiro</option>
                                        <option>Quadra</option><option>Corredor</option><option>Fora da Escola</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tipo de Ocorrência *</label>
                                    <select name="tipo" class="form-select" required>
                                        <option value="">Selecione...</option>
                                        <option>Bullying</option><option>Cyberbullying</option><option>Agressão Física</option>
                                        <option>Agressão Verbal</option><option>Discriminação</option><option>Assédio</option>
                                        <option>Danos ao patrimônio</option><option>Outro</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Data do Ocorrido</label>
                                <input type="date" name="data_ocorrido" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Descrição Detalhada *</label>
                                <textarea name="descricao" class="form-control" rows="4" required></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Anexar Prova (Foto/Print - Opcional)</label>
                                <input type="file" name="imagem" class="form-control" accept="image/*">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Enviar Denúncia Anonimamente</button>
                        </form>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
